<!DOCTYPE html>

<html>
  <head>
    <meta charset="UTF-8" />
    <title>Registration Successful</title>
  </head>

  <body
    style="
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
    "
  >
    <table width="100%" cellpadding="0" cellspacing="0" style="padding: 20px">
      <tr>
        <td align="center">
          <table
            width="500"
            cellpadding="0"
            cellspacing="0"
            style="background: #ffffff; border-radius: 8px; overflow: hidden"
          >
            <tr>
              <td>
                <img
                  src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267"
                  alt="Welcome Image"
                  width="100%"
                  style="display: block"
                />
              </td>
            </tr>

            <tr>
              <td style="padding: 30px; text-align: center">
                <h2 style="margin: 0; color: #333">Login Successful</h2>

                <p style="color: #555; font-size: 15px; margin-top: 15px">
                  Hello {{name}},
                </p>

                <p style="color: #555; font-size: 15px">
                  You have successfully logged into your account. If this wasn't
                  you, please secure your account immediately.
                </p>

                <a
                  href="https://yourwebsite.com"
                  style="
                    display: inline-block;
                    margin-top: 20px;
                    padding: 12px 20px;
                    background: #ff5a5f;
                    color: #ffffff;
                    text-decoration: none;
                    border-radius: 5px;
                  "
                >
                  Go to Dashboard
                </a>
              </td>
            </tr>

            <tr>
              <td
                style="
                  background: #f0f0f0;
                  text-align: center;
                  padding: 15px;
                  font-size: 12px;
                  color: #777;
                "
              >
                © 2026 Stayora. All rights reserved.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
