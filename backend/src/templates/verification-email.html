<!-- verification-email.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify your email</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #111827;
      background-color: #f9fafb;
      margin: 0;
      padding: 40px 20px;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 12px 0;
      color: #111827;
    }
    p {
      font-size: 15px;
      color: #6b7280;
      margin: 0 0 24px 0;
    }
    .button {
      display: inline-block;
      background-color: #3b82f6;
      color: #ffffff;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 14px;
      margin: 8px 0 24px 0;
    }
    .small {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e5e7eb;
    }
    .link {
      color: #3b82f6;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Verify your email, {{name}} ✨</h1>
    
    <p>Thanks for joining Stayora. Click the button below to verify your email and start booking amazing properties.</p>
    
    <a href="{{verificationLink}}" class="button">Verify Email Address</a>
    
    <p class="small">
      This link expires in 24 hours.<br>
      If you didn't create an account, you can safely ignore this email.
    </p>
  </div>
</body>
</html>
