<!DOCTYPE html>
<html>
<head>
  <style>
    .button {
      background-color: #3b82f6;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      display: inline-block;
    }
  </style>
</head>
<body>
  <h1>Welcome to Stayora, {{name}}! 🎉</h1>
  
  <p>Thanks for joining us. Please verify your email to start booking amazing properties.</p>
  
  <a href="{{verificationLink}}" class="button">Verify Email Address</a>
  
  <p>This link expires in 24 hours.</p>
  
  <hr>
  <p style="color: #666; font-size: 12px;">
    Once verified, you'll have full access to book properties, message hosts, and manage your trips.
  </p>
</body>
</html>
