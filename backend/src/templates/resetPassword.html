<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f6f6f6; padding: 20px;">

  <div style="max-width: 500px; margin: auto; background: #ffffff; padding: 20px; border-radius: 8px;">
    
    <h2 style="text-align: center; color: #333;">Reset Your Password</h2>

    <p style="color: #555;">
      You requested to reset your password. Click the button below to proceed.
    </p>

    <div style="text-align: center; margin: 20px 0;">
      <a 
        href="{{resetURL}}" 
        style="background-color: #4f46e5; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;"
      >
        Reset Password
      </a>
    </div>

    <p style="color: #999; font-size: 12px;">
      This link will expire in 10 minutes. If you didn’t request this, you can ignore this email.
    </p>

  </div>

</body>
</html>
